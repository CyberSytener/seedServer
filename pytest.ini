[pytest]
# Pytest configuration for SEED server tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Files to exclude from test discovery
norecursedirs = 
    .git
    .venv
    venv
    dist
    build
    *.egg

# Add project root to Python path automatically
pythonpath = .

# Minimum Python version
minversion = 3.11

# Default options
addopts = 
    -v
    --strict-markers
    --tb=short

# Pytest-asyncio: automatically support async test functions where feasible
asyncio_mode = auto

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require external services like Redis)
    slow: Slow tests (can be skipped with -m "not slow")
    sim: End-to-end simulation harness tests in stub mode
    real_smoke: Secrets-gated real-provider smoke tests
    asyncio: Async tests (require pytest-asyncio or anyio)
    tier1: Unit tests (low complexity)
    tier2: Service integration (medium complexity)
    tier3: API & HTTP tests (medium complexity)
    tier4: Realtime & saga tests (high complexity)

# Treat warnings as errors for zero-warning enforcement
filterwarnings =
    error
    ignore::PendingDeprecationWarning
    ignore:The 'app' shortcut is now deprecated.*:DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::sqlalchemy.exc.MovedIn20Warning

# Coverage options (when using --cov)
[coverage:run]
source = app
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
