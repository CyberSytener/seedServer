openapi: 3.1.0
info:
  title: Seed Photo Editing API
  version: 1.0.0
  description: Context-aware portrait editing service (CV, profile photo, etc.)
  contact:
    name: API Support

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.seed.example.com
    description: Production

paths:
  /api/photo/upload:
    post:
      summary: Upload and initiate photo editing job
      description: |
        Upload a portrait photo for editing. Validates format, size, and face detection.
        Returns a job_id for polling status.
      tags:
        - Photo Editing
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Portrait image (JPEG/PNG, ≤ 8MB, min 600px)
                context:
                  type: string
                  enum: [cv, profile, linkedin, headshot]
                  default: cv
                  description: Use case context for optimized prompt
                variants:
                  type: integer
                  minimum: 1
                  maximum: 3
                  default: 1
                  description: Number of variations to generate
                consent_confirmed:
                  type: boolean
                  default: false
                  description: User confirmed data retention and deletion policy
              required:
                - file
                - consent_confirmed
      responses:
        '202':
          description: Job successfully enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreatedResponse'
        '400':
          description: Validation error (invalid format, no face, multiple faces)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noFace:
                  value:
                    error: "No face detected in image"
                    code: "NO_FACE_DETECTED"
                multipleFaces:
                  value:
                    error: "Multiple faces detected; please provide single portrait"
                    code: "MULTIPLE_FACES_DETECTED"
                invalidFormat:
                  value:
                    error: "File must be JPEG or PNG"
                    code: "INVALID_FORMAT"
        '401':
          description: Unauthorized
        '413':
          description: File too large (max 8MB)
        '429':
          description: Rate limited
        '500':
          description: Server error

  /api/photo/status/{job_id}:
    get:
      summary: Get photo editing job status
      description: Poll job status, preview, and estimated cost
      tags:
        - Photo Editing
      security:
        - BearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusResponse'
        '401':
          description: Unauthorized
        '404':
          description: Job not found
        '500':
          description: Server error

  /api/photo/confirm/{job_id}:
    post:
      summary: Confirm and process payment for edited photo
      description: |
        Confirm download of edited photo. Triggers billing (credits/charge).
        After confirmation, final image is available without watermark.
      tags:
        - Photo Editing
      security:
        - BearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                variant_index:
                  type: integer
                  description: Index of variant to confirm (0-based)
                  default: 0
      responses:
        '200':
          description: Payment processed; download link provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmResponse'
        '400':
          description: Invalid variant index or job already confirmed
        '402':
          description: Insufficient credits / payment failed
        '401':
          description: Unauthorized
        '404':
          description: Job not found
        '500':
          description: Server error

  /api/photo/delete/{job_id}:
    post:
      summary: Request deletion of photo and results
      description: Immediately delete original and edited photos (GDPR compliance)
      tags:
        - Photo Editing
      security:
        - BearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deletion initiated
        '401':
          description: Unauthorized
        '404':
          description: Job not found
        '500':
          description: Server error

  /api/photo/list:
    get:
      summary: List user's photo editing jobs
      description: Paginated list of user's photo editing history
      tags:
        - Photo Editing
      security:
        - BearerAuth: []
      parameters:
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, running, done, failed]
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/JobSummary'
        '401':
          description: Unauthorized
        '500':
          description: Server error

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    JobCreatedResponse:
      type: object
      properties:
        job_id:
          type: string
          description: Unique job identifier
        status:
          type: string
          enum: [queued, running]
        queue_position:
          type: integer
          description: Approximate position in queue
        cost_estimate_usd:
          type: number
          format: double
          description: Estimated cost in USD (for paid users)
        eta_seconds:
          type: integer
          description: Estimated time to completion
      required:
        - job_id
        - status

    JobStatusResponse:
      type: object
      properties:
        job_id:
          type: string
        user_id:
          type: string
        context:
          type: string
          enum: [cv, profile, linkedin, headshot]
        status:
          type: string
          enum: [queued, running, done, failed, cancelled]
        progress:
          type: integer
          description: 0-100
        message:
          type: string
          description: Status message or error detail
        preview_url:
          type: string
          format: uri
          description: Temporary URL to preview (expires in 1 hour)
        variants:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              preview_url:
                type: string
                format: uri
              download_url:
                type: string
                format: uri
                description: Available only after confirm()
        confirmed:
          type: boolean
          description: Whether user confirmed and paid
        cost_actual_usd:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      required:
        - job_id
        - user_id
        - status

    ConfirmResponse:
      type: object
      properties:
        job_id:
          type: string
        confirmed_at:
          type: string
          format: date-time
        cost_charged_usd:
          type: number
          format: double
        download_url:
          type: string
          format: uri
          description: Direct download link (presigned S3 URL, valid 24 hours)
        file_size_bytes:
          type: integer
        file_name:
          type: string
      required:
        - job_id
        - confirmed_at
        - download_url

    JobSummary:
      type: object
      properties:
        job_id:
          type: string
        context:
          type: string
        status:
          type: string
        preview_url:
          type: string
          format: uri
        confirmed:
          type: boolean
        cost_usd:
          type: number
          format: double
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        request_id:
          type: string
          description: Unique request identifier for debugging
      required:
        - error
        - code
