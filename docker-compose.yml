services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-seed_server}
      - POSTGRES_USER=${POSTGRES_USER:-seed}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-seed}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seed -d seed_server"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SEED_REDIS_URL=${SEED_REDIS_URL:-redis://redis:6379/0}
      - SEED_REDIS_NAMESPACE=${SEED_REDIS_NAMESPACE:-seed}
      - SEED_DB_PATH=/data/seed.db
      - DATABASE_URL=${DATABASE_URL:-postgresql://seed:seed@postgres:5432/seed_server}
      - SEED_SAGA_DB_URL=${SEED_SAGA_DB_URL:-postgresql://seed:seed@postgres:5432/seed_server}
      - SEED_METRICS_ENABLED=${SEED_METRICS_ENABLED:-1}
      - SEED_OPTIMIZE_MODE=${SEED_OPTIMIZE_MODE:-false}
      - SEED_PROMPT_TEST_MODE=${SEED_PROMPT_TEST_MODE:-false}
    volumes:
      - seed_data:/data
    depends_on:
      - postgres
      - redis

  scheduler:
    build: .
    command: ["python", "scripts/run_scheduler.py"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://api:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file:
      - .env
    environment:
      - SEED_REDIS_URL=${SEED_REDIS_URL:-redis://redis:6379/0}
      - SEED_REDIS_NAMESPACE=${SEED_REDIS_NAMESPACE:-seed}
      - SEED_DB_PATH=/data/seed.db
      - DATABASE_URL=${DATABASE_URL:-postgresql://seed:seed@postgres:5432/seed_server}
      - SEED_SAGA_DB_URL=${SEED_SAGA_DB_URL:-postgresql://seed:seed@postgres:5432/seed_server}
    volumes:
      - seed_data:/data
    depends_on:
      - postgres
      - redis
      - api

  worker_fast:
    build: .
    command: ["python", "scripts/run_worker.py", "--queue", "q_fast", "--name", "fast"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://api:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file:
      - .env
    environment:
      - SEED_REDIS_URL=${SEED_REDIS_URL:-redis://redis:6379/0}
      - SEED_REDIS_NAMESPACE=${SEED_REDIS_NAMESPACE:-seed}
      - SEED_DB_PATH=/data/seed.db
      - DATABASE_URL=${DATABASE_URL:-postgresql://seed:seed@postgres:5432/seed_server}
      - SEED_SAGA_DB_URL=${SEED_SAGA_DB_URL:-postgresql://seed:seed@postgres:5432/seed_server}
      - SEED_WORKER_QUEUE=q_fast
      - SEED_WORKER_NAME=fast
    volumes:
      - seed_data:/data
    depends_on:
      - postgres
      - redis
      - api

  worker_batch:
    build: .
    command: ["python", "scripts/run_worker.py", "--queue", "q_batch", "--name", "batch"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://api:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file:
      - .env
    environment:
      - SEED_REDIS_URL=${SEED_REDIS_URL:-redis://redis:6379/0}
      - SEED_REDIS_NAMESPACE=${SEED_REDIS_NAMESPACE:-seed}
      - SEED_DB_PATH=/data/seed.db
      - DATABASE_URL=${DATABASE_URL:-postgresql://seed:seed@postgres:5432/seed_server}
      - SEED_SAGA_DB_URL=${SEED_SAGA_DB_URL:-postgresql://seed:seed@postgres:5432/seed_server}
      - SEED_WORKER_QUEUE=q_batch
      - SEED_WORKER_NAME=batch
    volumes:
      - seed_data:/data
    depends_on:
      - postgres
      - redis
      - api

  worker_low:
    build: .
    command: ["python", "scripts/run_worker.py", "--queue", "q_low", "--name", "low"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://api:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file:
      - .env
    environment:
      - SEED_REDIS_URL=${SEED_REDIS_URL:-redis://redis:6379/0}
      - SEED_REDIS_NAMESPACE=${SEED_REDIS_NAMESPACE:-seed}
      - SEED_DB_PATH=/data/seed.db
      - DATABASE_URL=${DATABASE_URL:-postgresql://seed:seed@postgres:5432/seed_server}
      - SEED_SAGA_DB_URL=${SEED_SAGA_DB_URL:-postgresql://seed:seed@postgres:5432/seed_server}
      - SEED_WORKER_QUEUE=q_low
      - SEED_WORKER_NAME=low
    volumes:
      - seed_data:/data
    depends_on:
      - postgres
      - redis
      - api

  # -- Agent sandbox worker (Phase 7 — P7-14) --
  # Isolated container for tool execution: no secrets, no DB, no external egress.
  agent_sandbox:
    build: .
    command: ["python", "-m", "app.agent_sandbox_worker"]
    networks:
      - default
      - agent_sandbox_net
    tmpfs:
      - /work:size=100M,noexec
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - SEED_SANDBOX_MODE=true
      - SEED_REDIS_URL=redis://redis:6379/2
      - SEED_DB_PATH=
      - HTTPS_PROXY=http://sandbox_egress_proxy:3128
      - HTTP_PROXY=http://sandbox_egress_proxy:3128
    depends_on:
      - redis
      - sandbox_egress_proxy

  # -- Sandbox egress proxy (P0-28) --
  # Allow-listed CONNECT proxy: sandbox can reach github.com only.
  sandbox_egress_proxy:
    build: .
    command: ["python", "scripts/sandbox_egress_proxy.py"]
    networks:
      - default
      - agent_sandbox_net
    environment:
      - PROXY_PORT=3128
      - PROXY_ALLOWLIST=github.com,api.github.com,raw.githubusercontent.com,codeload.github.com
      - PROXY_MAX_RPM=60
      - PROXY_MAX_BYTES=5242880
      - PROXY_CONNECT_TIMEOUT=5
      - PROXY_READ_TIMEOUT=15
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

networks:
  default:
    driver: bridge
  agent_sandbox_net:
    internal: true

volumes:
  redis_data:
  seed_data:
  pg_data:
