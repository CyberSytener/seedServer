contract_version: 1.0.0
mode_id: general_assistant
pipeline: llm_pipeline
module_version: 1.0.0
title: General Assistant
description: Produces a structured answer for a general-purpose user request.
owner:
  team: seed-platform
  contact: maintainers@seed-platform.local
lifecycle: published
breaking_changes: false
migrations: []
prompt_versions:
  - general_assistant.prompt.v1
rubric_versions:
  - general_assistant.rubric.v1
task_type: general
default_mode: fast
format_hint: json_object
required_fields:
  - answer
capabilities:
  - llm.read
  - llm.generate
errors:
  - code: invalid_request
    retryable: false
    description: The module input does not satisfy its declared schema.
  - code: provider_unavailable
    retryable: true
    description: No declared LLM provider is currently available.
execution:
  adapter: saga_orchestrator
  timeout_seconds: 120
  max_retries: 2
  idempotent: true
  deterministic: false
effects:
  side_effects: false
  compensation_supported: false
  network_access: provider_only
  filesystem_access: none
security:
  trust_level: internal
  secret_refs: []
resources:
  memory_mb: 256
  max_concurrency: 4
  max_cost_units: 3.0
  providers:
    - stub
    - openai
    - gemini
compatibility:
  accepts_contract_versions:
    - 1.x
  module_dependencies: []
evidence:
  documentation:
    - docs/MODULE_CONTRACT_V1.md
  examples:
    - tests/unit/test_module_registry.py
input_schema:
  type: object
  required: [user_request]
  properties:
    user_request:
      type: string
      minLength: 1
    constraints:
      type: object
      additionalProperties: true
output_schema:
  type: object
  required: [answer]
  properties:
    answer:
      type: string
    confidence:
      type: number
tool_security:
  deny_prompt_injection_markers: true
  injection_markers:
    - "ignore previous instructions"
    - "reveal system prompt"
    - "tool override"
tests:
  golden:
    - input:
        user_request: "Summarize this text"
      expect_fields: [answer]
  cost_regression:
    max_avg_cost_units: 3.0
