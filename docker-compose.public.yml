name: seed_public

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seed_server}
      POSTGRES_USER: ${POSTGRES_USER:-seed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seed}
    volumes:
      - pg_public_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seed} -d ${POSTGRES_DB:-seed_server}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_public_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    build: .
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env.public
    ports:
      - "127.0.0.1:${PUBLIC_BIND_PORT:-8000}:8000"
    volumes:
      - seed_public_data:/data
      - ./logs/public:/var/log/seed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  scheduler:
    build: .
    restart: unless-stopped
    command: ["python", "scripts/run_scheduler.py"]
    env_file:
      - .env.public
    volumes:
      - seed_public_data:/data
      - ./logs/public:/var/log/seed
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker_fast:
    build: .
    restart: unless-stopped
    command: ["python", "scripts/run_worker.py", "--queue", "q_fast", "--name", "public_fast"]
    env_file:
      - .env.public
    volumes:
      - seed_public_data:/data
      - ./logs/public:/var/log/seed
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker_batch:
    build: .
    restart: unless-stopped
    command: ["python", "scripts/run_worker.py", "--queue", "q_batch", "--name", "public_batch"]
    env_file:
      - .env.public
    volumes:
      - seed_public_data:/data
      - ./logs/public:/var/log/seed
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker_low:
    build: .
    restart: unless-stopped
    command: ["python", "scripts/run_worker.py", "--queue", "q_low", "--name", "public_low"]
    env_file:
      - .env.public
    volumes:
      - seed_public_data:/data
      - ./logs/public:/var/log/seed
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pg_public_data:
  redis_public_data:
  seed_public_data:
