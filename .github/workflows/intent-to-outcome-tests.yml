name: intent-to-outcome-tests

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "app/contracts/opportunity/**"
      - "app/domain/opportunity/**"
      - "app/services/opportunity/**"
      - "app/core/flow_graph.py"
      - "app/core/realtime/sagas/flows/**"
      - "app/services/flow_contract_validator.py"
      - "docs/INTENT_TO_OUTCOME_*.md"
      - "docs/SEED_SERVER_MANIFEST_ALIGNMENT_AUDIT.md"
      - "docs/TEST_STRATEGY.md"
      - "scripts/run_quality_gate.py"
      - "tests/unit/opportunity/**"
      - "tests/integration/opportunity/**"
      - "tests/unit/test_quality_gate_runner.py"
      - "tests/unit/test_flow_graph.py"
      - "tests/unit/test_flow_contract_validator.py"
      - "tests/unit/realtime/test_flow_executor_import_boundary.py"
      - "tests/unit/realtime/test_flow_cycle_rejection.py"
      - ".github/workflows/intent-to-outcome-tests.yml"
  push:
    branches: [main, master]
    paths:
      - "AGENTS.md"
      - "app/contracts/opportunity/**"
      - "app/domain/opportunity/**"
      - "app/services/opportunity/**"
      - "app/core/flow_graph.py"
      - "app/core/realtime/sagas/flows/**"
      - "app/services/flow_contract_validator.py"
      - "docs/INTENT_TO_OUTCOME_*.md"
      - "docs/SEED_SERVER_MANIFEST_ALIGNMENT_AUDIT.md"
      - "docs/TEST_STRATEGY.md"
      - "scripts/run_quality_gate.py"
      - "tests/unit/opportunity/**"
      - "tests/integration/opportunity/**"
      - "tests/unit/test_quality_gate_runner.py"
      - "tests/unit/test_flow_graph.py"
      - "tests/unit/test_flow_contract_validator.py"
      - "tests/unit/realtime/test_flow_executor_import_boundary.py"
      - "tests/unit/realtime/test_flow_cycle_rejection.py"
      - ".github/workflows/intent-to-outcome-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  candidate:
    runs-on: ubuntu-latest
    env:
      SEED_ENV: test
      SEED_DEV: "0"
      SEED_DB_PATH: ":memory:"
      SEED_DEFAULT_PROVIDER_FAST: stub
      SEED_DEFAULT_PROVIDER_BATCH: stub
      SEED_ENABLE_STUB: "1"
      SEED_ENABLE_LEGACY_X_USER_ID: "0"
      SEED_SEED_DEV_USERS_ON_STARTUP: "0"
      SEED_DEV_CORS: "0"
      SEED_METRICS_ENABLED: "0"
      JWT_SECRET_KEY: test-jwt-secret-key-change-this-32-bytes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Intent-to-Outcome Candidate gate
        run: python scripts/run_quality_gate.py intent-to-outcome
