name: catalog-validation

on:
  pull_request:
    paths:
      - 'app/catalog/**'
      - 'scripts/validate_catalog.py'
      - '.github/workflows/catalog-validation.yml'
  push:
    branches: [ main ]
    paths:
      - 'app/catalog/**'
      - 'scripts/validate_catalog.py'
      - '.github/workflows/catalog-validation.yml'

jobs:
  validate-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install validation deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
      - name: Validate catalog tree + manifests
        run: python scripts/validate_catalog.py app/catalog
