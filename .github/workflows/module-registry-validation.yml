name: module-registry-validation

on:
  pull_request:
    paths:
      - 'modules/**'
      - 'app/contracts/**'
      - 'scripts/validate_modules.py'
      - '.github/workflows/module-registry-validation.yml'
  push:
    branches: [ main ]
    paths:
      - 'modules/**'
      - 'app/contracts/**'
      - 'scripts/validate_modules.py'
      - '.github/workflows/module-registry-validation.yml'

jobs:
  validate-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install validation deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pydantic jsonschema
      - name: Validate module specs
        run: python scripts/validate_modules.py modules
