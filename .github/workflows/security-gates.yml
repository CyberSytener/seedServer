name: security-gates

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Runtime dependency smoke check
        run: python scripts/ci_smoke_check.py

      - name: Bandit (app/)
        run: bandit -r app -x tests -q

      - name: Dependency vulnerability audit
        run: pip-audit
