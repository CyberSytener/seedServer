name: route-registration-sanity

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/main.py"
      - "app/api/**"
      - "app/core/**"
      - "scripts/check_route_registration.py"
      - ".github/workflows/route-registration-sanity.yml"
  push:
    branches: [main, master]
    paths:
      - "app/main.py"
      - "app/api/**"
      - "app/core/**"
      - "scripts/check_route_registration.py"
      - ".github/workflows/route-registration-sanity.yml"

permissions:
  contents: read

jobs:
  route-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check route registration
        run: python scripts/check_route_registration.py
