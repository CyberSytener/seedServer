name: server-intel-drift

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  verify-server-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Verify server_intel drift
        env:
          SERVER_INTEL_DRIFT_MAX: '8'
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python scripts/verify_server_intel.py --max-drift $SERVER_INTEL_DRIFT_MAX --write-snapshot
