name: simulation-tests

on:
  pull_request:
    paths:
      - 'app/sim/**'
      - 'app/main.py'
      - 'app/services/**'
      - 'tests/unit/sim/**'
      - 'pytest.ini'
      - '.github/workflows/simulation-tests.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'app/sim/**'
      - 'app/main.py'
      - 'app/services/**'
      - 'tests/unit/sim/**'
      - 'pytest.ini'
      - '.github/workflows/simulation-tests.yml'

jobs:
  sim:
    runs-on: ubuntu-latest
    env:
      SEED_DEFAULT_PROVIDER_FAST: stub
      SEED_DEFAULT_PROVIDER_BATCH: stub
      SEED_ENABLE_STUB: "1"
      SEED_METRICS_ENABLED: "0"
      SEED_EMBEDDED_WORKERS: "0"
      SEED_EMBEDDED_SCHEDULER: "0"
      SIM_OUTPUT_DIR: .seed_artifacts/simulation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run simulation marker tests
        run: python -m pytest -m sim -q

      - name: Run simulation harness report
        run: python -m app.sim.run --output-dir "$SIM_OUTPUT_DIR"

      - name: Upload simulation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-report
          path: .seed_artifacts/simulation
          if-no-files-found: warn
