name: system-analysis

on:
  pull_request:
    paths:
      - "scripts/build_system_analysis.py"
      - "tests/unit/test_system_analysis.py"
      - "docs/system-analysis/**"
      - "README.md"
      - "SOURCE_OF_TRUTH.md"
      - "AGENTS.md"
      - "docs/ACTIVE_PLATFORM_SCOPE.md"
      - "docs/TEST_STRATEGY.md"
      - "scripts/run_quality_gate.py"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "app/**"
      - "modules/**"
      - "tests/**"
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test analyzer
        run: python -m unittest discover -s tests/unit -p "test_system_analysis.py" -v

      - name: Generate repository inventory
        run: >-
          python scripts/build_system_analysis.py
          --revision "${GITHUB_SHA}"
          --output-dir system-analysis-artifacts

      - name: Validate machine-readable inventory
        run: python -m json.tool system-analysis-artifacts/inventory.json > /dev/null

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: seed-system-analysis
          path: system-analysis-artifacts/
          retention-days: 14
          if-no-files-found: error
