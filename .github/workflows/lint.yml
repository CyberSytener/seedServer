name: lint

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile portfolio Python surface
        run: |
          python -m compileall -q \
            app/api/console \
            app/contracts \
            app/core/realtime/sagas \
            app/services/module_registry.py \
            app/sim \
            scripts/run_portfolio_demo.py

      - name: Lint portfolio Python surface
        run: |
          flake8 \
            app/api/console \
            app/contracts \
            app/services/module_registry.py \
            app/services/flow_contract_validator.py \
            scripts/validate_modules.py \
            scripts/run_portfolio_demo.py \
            tests/unit/test_module_contract_v1.py \
            tests/unit/test_flow_contract_validator.py \
            tests/unit/test_console_runtime_api.py \
            tests/unit/test_module_registry.py \
            tests/unit/test_modes_api.py \
            tests/unit/test_auth_providers_api.py \
            --select=E9,F63,F7,F82 \
            --max-line-length=120 \
            --statistics

      - name: Type-check with mypy (advisory)
        run: |
          mypy app/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --allow-untyped-defs \
            --warn-unused-configs \
            --no-error-summary || true

  console-build:
    name: Saga Console (TypeScript + Vite build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: saga-console/package-lock.json

      - name: Install dependencies
        working-directory: saga-console
        run: npm ci

      - name: Type-check and build
        working-directory: saga-console
        run: npm run build
